name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install apt deps
      run: |
        sudo apt-get -y update
        DEBIAN_FRONTEND=noninteractive apt install -y libcurl4-openssl-dev clang-format postgresql curl
    - name: check format
      run : |
        find . -type f -not -path './vendor/*' \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' \) -print0 | xargs -0 clang-format --dry-run -Werror
    - name: fetch-deps
      run: |
        mkdir -p _build && cd _build
        git clone --single-branch -b maint-15.0.2 https://github.com/apache/arrow.git
        cd arrow && git apply ../../vendor/arrow/fix_c-ares_url.patch && cd ..
        ./arrow/cpp/thirdparty/download_dependencies.sh ./arrow-thirdparty
    - name: cmake
      run: |
        cd _build
        cmake -GNinja -DICECXX_USE_REST=ON -DICECXX_STATISTICS=ON -DICECXX_USE_SMHASHER=OFF ../
    - name: make
      run: |
        cd _build
        ninja
    - name: run lakekeeper
        sed -i 's/scram-sha-256/trust/g' /etc/postgresql/16/main/pg_hba.conf
        /etc/init.d/postgresql start

        curl -sL https://github.com/lakekeeper/lakekeeper/releases/download/v0.12.1/lakekeeper-x86_64-unknown-linux-gnu.tar.gz | tar -xzf -
        export LAKEKEEPER__PG_DATABASE_URL_READ="postgres://postgres@localhost/postgres"
        export LAKEKEEPER__PG_DATABASE_URL_WRITE="postgres://postgres@localhost/postgres"
        ./lakekeeper migrate
        psql -h localhost -U postgres -f tests/rest/setup_lakekeeper.sql postgres
        ./lakekeeper serve &
        sleep 5
        curl -X GET http://localhost:8181/catalog/v1/91dc12d2-534d-11f1-9109-73b91866a831/namespaces/ns1/tables/lineitem
    - name: test
      run: |
        cd _build/tests/
        ../iceberg/iceberg-cpp-test
        ../iceberg/common/fs/iceberg_common_fs_test
        ../iceberg/common/iceberg_common_test
        ../iceberg/equality_delete/iceberg_equality_delete_test
        ../iceberg/positional_delete/iceberg_positional_delete_test
        ../iceberg/filter/representation/filter_representation_ut
        ../iceberg/filter/stats_filter/stats_filter_ut
        ../iceberg/filter/row_filter/row_filter_ut
        ../iceberg/streams/compute/ice_compute_ut
        ../iceberg/streams/iceberg_streams_ut
        ./iceberg_local_test

